# =============================================================================
# Omnivex Ecosystem — Main CI/CD Pipeline
# GitLab CI/CD Configuration
# Author: Jeffrey Williams
# Updated: 2026-04-06
#
# This pipeline runs on:
#   - Pushes to `main` branch
#   - Merge Requests (MRs) targeting `main`
#
# Stages: build → test → quality → security → deploy
# =============================================================================

include:
  - local: "security-ci.yml"

# ---------------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------------
default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
  before_script:
    - node --version
    - npm --version

# ---------------------------------------------------------------------------
# Stage ordering
# ---------------------------------------------------------------------------
stages:
  - build
  - test
  - quality
  - security
  - deploy

# ---------------------------------------------------------------------------
# Workflow rules — only run on main pushes and MRs
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  NODE_ENV: "test"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  # Netlify deploy variables (set in GitLab CI/CD > Variables)
  # NETLIFY_AUTH_TOKEN  — masked, protected
  # NETLIFY_SITE_ID     — masked, protected
  DEPLOY_ENVIRONMENT: "production"
  SAST_EXCLUDED_ANALYZERS: ""
  SECRET_DETECTION_HISTORIC_SCAN: "false"

# =============================================================================
# STAGE: BUILD
# =============================================================================

# ---------------------------------------------------------------------------
# Install dependencies and compile TypeScript
# ---------------------------------------------------------------------------
build:install:
  stage: build
  script:
    - echo "==> Installing dependencies..."
    - npm ci --prefer-offline
    - echo "==> Dependency installation complete."
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

build:compile:
  stage: build
  needs: ["build:install"]
  script:
    - echo "==> Compiling TypeScript..."
    - npx tsc --noEmit
    - npm run build
    - echo "==> Compilation successful."
  artifacts:
    paths:
      - dist/
      - .next/         # Next.js build output (if applicable)
      - build/         # CRA / Vite build output (if applicable)
    expire_in: 1 hour

# =============================================================================
# STAGE: TEST
# =============================================================================

# ---------------------------------------------------------------------------
# Unit Tests
# ---------------------------------------------------------------------------
test:unit:
  stage: test
  needs: ["build:install"]
  variables:
    NODE_ENV: "test"
  script:
    - echo "==> Running unit tests..."
    - npm run test:unit -- --ci --coverage --coverageReporters=text --coverageReporters=cobertura
    - echo "==> Unit tests complete."
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Integration Tests
# ---------------------------------------------------------------------------
test:integration:
  stage: test
  needs: ["build:compile"]
  variables:
    NODE_ENV: "test"
    # Integration tests may need a live DB — use GitLab services
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: omnivex_test
    POSTGRES_USER: omnivex
    POSTGRES_PASSWORD: omnivex_test_pass
    DATABASE_URL: "postgresql://omnivex:omnivex_test_pass@postgres:5432/omnivex_test"
    REDIS_URL: "redis://redis:6379"
  script:
    - echo "==> Waiting for Postgres..."
    - until pg_isready -h postgres -U omnivex; do sleep 1; done
    - echo "==> Running database migrations..."
    - npm run db:migrate 2>/dev/null || echo "No migrate script found — skipping."
    - echo "==> Running integration tests..."
    - npm run test:integration -- --ci
    - echo "==> Integration tests complete."
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 7 days
  allow_failure: false

# ---------------------------------------------------------------------------
# End-to-end smoke tests (only on main, not MRs)
# ---------------------------------------------------------------------------
test:e2e:smoke:
  stage: test
  needs: ["build:compile"]
  image: mcr.microsoft.com/playwright:v1.42.0-jammy
  script:
    - npm ci --prefer-offline
    - npx playwright install --with-deps chromium
    - npm run test:e2e:smoke
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# =============================================================================
# STAGE: QUALITY
# =============================================================================

# ---------------------------------------------------------------------------
# ESLint + Prettier
# ---------------------------------------------------------------------------
quality:lint:
  stage: quality
  needs: ["build:install"]
  script:
    - echo "==> Running ESLint..."
    - npm run lint -- --format gitlab
    - echo "==> Running Prettier check..."
    - npm run format:check
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    expire_in: 7 days
  allow_failure: false

# ---------------------------------------------------------------------------
# GitLab Code Quality (powered by CodeClimate engine)
# ---------------------------------------------------------------------------
code_quality:
  stage: quality
  needs: ["build:install"]
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    CODE_QUALITY_IMAGE: registry.gitlab.com/gitlab-org/ci-cd/codequality:latest
  script:
    - docker pull "$CODE_QUALITY_IMAGE"
    - docker run
        --env SOURCE_CODE="$PWD"
        --volume "$PWD":/code
        --volume /var/run/docker.sock:/var/run/docker.sock
        "$CODE_QUALITY_IMAGE" /code
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    paths:
      - gl-code-quality-report.json
    expire_in: 7 days
  rules:
    - if: '$CODE_QUALITY_DISABLED'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true

# ---------------------------------------------------------------------------
# TypeScript strict type check
# ---------------------------------------------------------------------------
quality:typecheck:
  stage: quality
  needs: ["build:install"]
  script:
    - echo "==> Running strict TypeScript type check..."
    - npx tsc --noEmit --strict
  allow_failure: false

# =============================================================================
# STAGE: SECURITY
# (Templates included via security-ci.yml)
# Additional lightweight jobs defined here
# =============================================================================

# ---------------------------------------------------------------------------
# GitLab SAST (Static Application Security Testing) — Free with Ultimate
# ---------------------------------------------------------------------------
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Override SAST job settings
sast:
  stage: security
  needs: []
  variables:
    SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, node_modules, .next, dist, coverage"
    SAST_DISABLE_BABEL: "true"
    SEARCH_MAX_DEPTH: 10
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Override dependency scanning
dependency_scanning:
  stage: security
  needs: []
  variables:
    DS_EXCLUDED_PATHS: "spec, test, tests, node_modules/.cache"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Override secret detection
secret_detection:
  stage: security
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ---------------------------------------------------------------------------
# npm audit (fast, lightweight)
# ---------------------------------------------------------------------------
security:npm-audit:
  stage: security
  needs: ["build:install"]
  script:
    - echo "==> Running npm audit..."
    - npm audit --audit-level=high --json > npm-audit.json || true
    - npm audit --audit-level=critical
  artifacts:
    paths:
      - npm-audit.json
    expire_in: 7 days
  allow_failure: true

# =============================================================================
# STAGE: DEPLOY
# =============================================================================

# ---------------------------------------------------------------------------
# Deploy to Netlify (Production — main branch only)
# ---------------------------------------------------------------------------
deploy:netlify:production:
  stage: deploy
  needs:
    - job: build:compile
      artifacts: true
    - job: test:unit
    - job: quality:lint
    - job: quality:typecheck
  image: node:20-alpine
  script:
    - echo "==> Installing Netlify CLI..."
    - npm install -g netlify-cli
    - echo "==> Deploying to Netlify production..."
    - netlify deploy
        --auth "$NETLIFY_AUTH_TOKEN"
        --site "$NETLIFY_SITE_ID"
        --dir ./dist
        --prod
        --message "Deploy from GitLab CI — commit $CI_COMMIT_SHORT_SHA by $CI_COMMIT_AUTHOR"
    - echo "==> Production deploy complete."
  environment:
    name: production
    url: https://$NETLIFY_SITE_NAME.netlify.app
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: on_success

# ---------------------------------------------------------------------------
# Deploy Preview (Merge Requests)
# ---------------------------------------------------------------------------
deploy:netlify:preview:
  stage: deploy
  needs:
    - job: build:compile
      artifacts: true
    - job: test:unit
    - job: quality:lint
  image: node:20-alpine
  script:
    - npm install -g netlify-cli
    - echo "==> Deploying Netlify preview for MR $CI_MERGE_REQUEST_IID..."
    - DEPLOY_URL=$(netlify deploy
        --auth "$NETLIFY_AUTH_TOKEN"
        --site "$NETLIFY_SITE_ID"
        --dir ./dist
        --alias "mr-$CI_MERGE_REQUEST_IID"
        --message "Preview MR !$CI_MERGE_REQUEST_IID — $CI_COMMIT_SHORT_SHA"
        --json | jq -r '.deploy_url')
    - echo "Preview URL $DEPLOY_URL"
    - echo "PREVIEW_URL=$DEPLOY_URL" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  environment:
    name: "review/mr-$CI_MERGE_REQUEST_IID"
    url: $PREVIEW_URL
    on_stop: deploy:netlify:preview:stop
    auto_stop_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ---------------------------------------------------------------------------
# Stop (destroy) preview environment when MR is closed
# ---------------------------------------------------------------------------
deploy:netlify:preview:stop:
  stage: deploy
  needs: []
  image: node:20-alpine
  script:
    - npm install -g netlify-cli
    - echo "==> Stopping preview for MR $CI_MERGE_REQUEST_IID..."
    - netlify api deleteDeploy
        --auth "$NETLIFY_AUTH_TOKEN"
        --data '{"site_id":"'"$NETLIFY_SITE_ID"'"}'
    - echo "==> Preview environment stopped."
  environment:
    name: "review/mr-$CI_MERGE_REQUEST_IID"
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual

# =============================================================================
# Notification on failure (main branch only)
# =============================================================================
notify:failure:
  stage: .post
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      curl -X POST "$SLACK_WEBHOOK_URL" \
        -H 'Content-type: application/json' \
        --data '{
          "text": ":red_circle: *Omnivex CI Failed* on `'"$CI_PROJECT_NAME"'`\nBranch: `'"$CI_COMMIT_BRANCH"'`\nCommit: `'"$CI_COMMIT_SHORT_SHA"'` by '"$CI_COMMIT_AUTHOR"'\nPipeline: '"$CI_PIPELINE_URL"'"
        }'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $SLACK_WEBHOOK_URL'
      when: on_failure
